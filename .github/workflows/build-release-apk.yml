name: Build Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2.23.0
      with:
        channel: stable

    - name: Find Flutter project root
      id: find_project
      run: |
        PROJECT_DIR=$(find . -maxdepth 4 -type f -name pubspec.yaml | head -n 1 | xargs -n1 dirname || true)
        if [ -z "$PROJECT_DIR" ]; then
          echo "No Flutter project found in repository."
          exit 1
        fi
        echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

    - name: Install dependencies
      working-directory: ${{ steps.find_project.outputs.project_dir }}
      run: flutter pub get

    - name: Build Release APK
      working-directory: ${{ steps.find_project.outputs.project_dir }}
      run: flutter build apk --release

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: ${{ steps.find_project.outputs.project_dir }}/build/app/outputs/flutter-apk/app-release.apk